    year: 2014-2019
    note: Open sources link the unit to several European cases, including the Salisbury poisoning, Vrbětice depot explosions, Montenegro coup attempt, and Bulgarian arms-dealer poisoning allegations.
  - title: WhisperGate and Ukraine-related cyber reporting
    year: 2022
    note: Public reporting links Cadet Blizzard / Ember Bear activity to Ukrainian government and infrastructure targeting around Russia's full-scale invasion.
  - title: U.S. and allied public advisory
    year: 2024
    note: Allied agencies publicly associated cyber activity with GRU Unit 29155 and warned critical infrastructure defenders.
