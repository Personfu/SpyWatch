name: validate

on:
  push:
  pull_request:

jobs:
  validate-actors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Validate actor profiles
        run: python scripts/validate_actors.py

      - name: Build index
        run: python scripts/build_index.py
